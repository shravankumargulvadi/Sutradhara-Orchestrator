services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: runtime
      network: host
    image: ros2-ws-ai:dev
    user: "0:0"
    working_dir: /workspace/ros2_ws_ai
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      ROS2_WS_AI_ROOT: /workspace/ros2_ws_ai
      UNDERLAY_INSTALL: /opt/underlay_ws/install
      PX4_DIR: /opt/px4
      PX4_BIN: /opt/px4/build/px4_sitl_default/bin/px4
      PX4_ROOTFS_BASE: /opt/px4/build/px4_sitl_default/rootfs
      PX4_GZ_MODELS_PATH: /opt/px4/Tools/simulation/gz/models
      PX4_GZ_WORLDS_PATH: /opt/px4/Tools/simulation/gz/worlds
      XRCE_INSTALL: /opt/xrce_ws/install
      MICRO_XRCE_AGENT_BIN: /opt/xrce_ws/install/microxrcedds_agent/bin/MicroXRCEAgent
      MICRO_XRCE_AGENT_LIB_DIR: /opt/xrce_ws/install/microxrcedds_agent/lib
      HOME: /tmp/devhome
      UV_CACHE_DIR: /tmp/uv-cache
      PYTHONPATH: /workspace/ros2_ws_ai/src/sutradhara_orchestrator
      AUTO_SOURCE_WORKSPACE_INSTALL: "0"
    volumes:
      - ${HOST_ROS2_WS_AI_ROOT:-.}:/workspace/ros2_ws_ai
      - ros2_ws_ai_build:/workspace/ros2_ws_ai/build
      - ros2_ws_ai_install:/workspace/ros2_ws_ai/install
      - ros2_ws_ai_log:/workspace/ros2_ws_ai/log
      - ros2_ws_ai_home:/tmp/devhome
      - ros2_ws_ai_uv_cache:/tmp/uv-cache

  sim:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: runtime
      network: host
    image: ros2-ws-ai:dev
    user: "0:0"
    working_dir: /workspace/ros2_ws_ai
    network_mode: host
    ipc: host
    stdin_open: true
    tty: true
    environment:
      ROS2_WS_AI_ROOT: /workspace/ros2_ws_ai
      UNDERLAY_INSTALL: /opt/underlay_ws/install
      PX4_DIR: /opt/px4
      PX4_BIN: /opt/px4/build/px4_sitl_default/bin/px4
      PX4_ROOTFS_BASE: /opt/px4/build/px4_sitl_default/rootfs
      PX4_GZ_MODELS_PATH: /opt/px4/Tools/simulation/gz/models
      PX4_GZ_WORLDS_PATH: /opt/px4/Tools/simulation/gz/worlds
      XRCE_INSTALL: /opt/xrce_ws/install
      MICRO_XRCE_AGENT_BIN: /opt/xrce_ws/install/microxrcedds_agent/bin/MicroXRCEAgent
      MICRO_XRCE_AGENT_LIB_DIR: /opt/xrce_ws/install/microxrcedds_agent/lib
      DISPLAY: "${DISPLAY:-}"
      XAUTHORITY: /root/.Xauthority
      QT_X11_NO_MITSHM: "1"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      NVIDIA_DRIVER_CAPABILITIES: "${NVIDIA_DRIVER_CAPABILITIES:-all}"
      HOME: /tmp/devhome
      UV_CACHE_DIR: /tmp/uv-cache
      PYTHONPATH: /workspace/ros2_ws_ai/src/sutradhara_orchestrator
      AUTO_SOURCE_WORKSPACE_INSTALL: "1"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ros2_ws_ai_home:/tmp/devhome
      - ros2_ws_ai_uv_cache:/tmp/uv-cache

volumes:
  ros2_ws_ai_build:
  ros2_ws_ai_install:
  ros2_ws_ai_log:
  ros2_ws_ai_home:
  ros2_ws_ai_uv_cache:
